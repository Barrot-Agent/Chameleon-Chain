name: Barrot Sovereign Deployment
on: [push]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Sovereign Site
      - name: Generate Agentic State
        run: python3 generate_state.py
        run: |
          mkdir -p build
          cp sovereign_site/pages/index.html build/index.html
      - name: Deploy to Barrot-Edge (GitHub Pages Substrate)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
