name: Barrot-Ω Activation
on:
  repository_dispatch:
    types: [stripe-payment-success]
jobs:
  ingress:
    runs-on: ubuntu-latest
    steps:
      - name: Debug and Execute
        env:
          STRIPE_KEY: ${{ secrets.STRIPE_KEY }}
        run: |
          echo "KEY_PREFIX: ${STRIPE_KEY:0:7}..."
          R=$(curl -s -u "$STRIPE_KEY:" https://api.stripe.com/v1/balance)
          if echo "$R" | grep -q "error"; then
            echo "STRIPE_ERROR: $(echo "$R" | grep -oP "\"message\":\s*\"\K[^\"]+")"
            exit 1
          fi
          V=$(echo "$R" | grep -o "\"amount\":[0-9]*" | head -1 | cut -d: -f2)
          echo "CURRENT_LIQUIDITY: $((V / 100)).00"
