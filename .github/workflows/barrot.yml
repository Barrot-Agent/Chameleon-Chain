name: Claude Code Action
on: [push, pull_request]

jobs:
  claude_review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Claude Code Action Official
        uses: anthropics/claude-code-action@v1
        with:
          # You MUST add CLAUDE_API_KEY to your GitHub Secrets/Variables
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          # Tell Claude what to look for (e.g., optimizing the 144 Council)
          prompt: "Analyze the current 0.707 baseline logic and ensure the Kaggle ingress is optimized."
          
