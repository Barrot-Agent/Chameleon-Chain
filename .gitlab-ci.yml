stages:
  - solver_strike

execute_aimo_breach:
  stage: solver_strike
  image: python:3.10-slim
  script:
    - pip install kaggle pandas numpy
    - python3 solver_upgrade.py
    - |
      python3 -c "
      import os, json, pathlib
      user = os.environ.get('KAGGLE_USERNAME')
      key = os.environ.get('KAGGLE_KEY')
      with open(pathlib.Path.home() / '.kaggle/kaggle.json', 'w') as f:
          json.dump({'username': user, 'key': key}, f)
      os.chmod(pathlib.Path.home() / '.kaggle/kaggle.json', 0o600)
      "
    - kaggle kernels push -p strike_zone
