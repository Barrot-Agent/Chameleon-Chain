barrot_pat_check:
    stage: test
      script:
          - echo "🔍 Checking for available GitLab PAT..."
              - |
                    if [ -n "$GITLAB_PAT" ]; then
                            echo "Using GITLAB_PAT"
                                    curl --header "PRIVATE-TOKEN: $GITLAB_PAT" https://gitlab.com/api/v4/user
                                          elif [ -n "$GITLAB_PATT" ]; then
                                                  echo "Using GITLAB_PATT"
                                                          curl --header "PRIVATE-TOKEN: $GITLAB_PATT" https://gitlab.com/api/v4/user
                                                                else
                                                                        echo "❌ No GitLab PAT found in environment variables"
                                                                                exit 1
                                                                          barrot_merge_mrs:
                                                                                    stage: deploy
                                                                                      script:
                                                                                          - echo "🤖 Barrot scanning for merge requests..."
                                                                                              - python barrot/tasks/merge.py
                                                                                                only:
                                                                                                    - schedules
                                                                                                        - main            fiimport os
                                                                                                        import requests

                                                                                                        GITLAB_API = "https://gitlab.com/api/v4"
                                                                                                        PROJECT_ID = os.getenv("CI_PROJECT_ID")
                                                                                                        TOKEN = os.getenv("GITLAB_PAT") or os.getenv("GITLAB_PATT")

                                                                                                        headers = {"PRIVATE-TOKEN": TOKEN}

                                                                                                        def get_open_mrs():
                                                                                                            url = f"{GITLAB_API}/projects/{PROJECT_ID}/merge_requests?state=opened"
                                                                                                                return requests.get(url, headers=headers).json()

                                                                                                                def merge_mr(mr):
                                                                                                                    url = f"{GITLAB_API}/projects/{PROJECT_ID}/merge_requests/{mr['iid']}/merge"
                                                                                                                        data = {"merge_when_pipeline_succeeds": True, "should_remove_source_branch": True}
                                                                                                                            res = requests.put(url, headers=headers, json=data)
                                                                                                                                print(f"Merging MR !{mr['iid']}: {res.status_code} - {res.text}")

                                                                                                                                for mr in get_open_mrs():
                                                                                                                                    if mr["merge_status"] == "can_be_merged":
                                                                                                                                            print(f"✅ Ready to merge: !{mr['iid']} - {mr['title']}")
                                                                                                                                                    merge_mr(mr)
                                                                                                                                                        else:
                                                                                                                                                                print(f"⛔ Skipping !{mr['iid']} - Not mergeable")