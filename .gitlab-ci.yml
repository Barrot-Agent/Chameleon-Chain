cat > .gitlab-ci.yml << 'EOF'
image: python:3.11

stages:
  - test
    - build

    variables:
      PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

      cache:
        paths:
            - .cache/pip

            before_script:
              - python --version
                - pip install --upgrade pip setuptools wheel
                  - pip install .[dev]

                  test:
                    stage: test
                      script:
                          - pytest
                            artifacts:
                                when: always
                                    reports:
                                          junit: pytest-report.xml

                                          build:
                                            stage: build
                                              script:
                                                  - pip install build
                                                      - python -m build
                                                        artifacts:
                                                            paths:
                                                                  - dist/
                                                                  EOF
                                                                  git add .gitlab-ci.yml Barrot_Ecosystem_Bundle_v2.1/src/barrot_lattice.egg-info/SOURCES.txt
                                                                  git commit -m "Resolve merge conflict: add verified GitLab CI/CD pipeline"
                                                                  git push origin main
                                                                   