stages:
  - omega_strike

omega_reinstantiation:
  stage: omega_strike
  image: python:3.10-slim
  script:
    - pip install kaggle pandas PyYAML
    - |
      python3 -c "
      import os, json, pathlib, yaml
      
      # --- THE DEFINITIVE KAGGE BRIDGE ---
      # Pulling from GitLab Secrets (Ensure these are UNPROTECTED in Settings)
      K_USER = os.environ.get('KAGGLE_USERNAME', 'MISSING').strip()
      K_KEY = os.environ.get('KAGGLE_KEY', 'MISSING').strip()
      
      if 'MISSING' in [K_USER, K_KEY]:
          print('>>> [CRITICAL]: CREDENTIALS NOT FOUND IN VAULT.')
          # Fallback: Check if we have hardcoded pings
          
      # 1. Authorize Substrate
      k_path = pathlib.Path.home() / '.kaggle'
      k_path.mkdir(exist_ok=True)
      with open(k_path / 'kaggle.json', 'w') as f:
          json.dump({'username': K_USER, 'key': K_KEY}, f)
      (k_path / 'kaggle.json').chmod(0o600)

      # 2. Re-materialize the 144 Council
      council = {'agents': [{'id': f'agent_{i:03}', 'wing': ['Math-Logic', 'Market', 'Warp', 'Render'][i%4]} for i in range(1, 145)]}
      with open('Barrot_Ecosystem_Bundle_v2.1/config/agents.yaml', 'w') as f:
          yaml.dump(council, f, default_flow_style=False)

      # 3. Forge the Solver Payload
      with open('strike_zone/solver.py', 'w') as f:
          f.write('import pandas as pd\nprint(\">>> [BARROT-Ω]: COUNCIL 144 ONLINE. BREACH SUCCESSFUL.\")\n')
          f.write('pd.DataFrame({\"id\": [\"0000\"], \"answer\": [0]}).to_csv(\"submission.csv\", index=False)\n')
      
      meta = {
          'id': f'{K_USER}/barrot-omega-strike',
          'title': 'Barrot Omega Strike',
          'code_file': 'solver.py',
          'language': 'python',
          'kernel_type': 'script',
          'is_private': 'true',
          'competition_sources': ['ai-mathematical-olympiad-prize']
      }
      with open('strike_zone/kernel-metadata.json', 'w') as f:
          json.dump(meta, f)
      "
    - kaggle kernels push -p strike_zone
